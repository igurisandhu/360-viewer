<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>360° Panorama Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      height: 100dvh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      cursor: grab;
    }
    #canvas-container.dragging { cursor: grabbing; }
    #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── Loading screen ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* ── Progress bar ── */
    .loader-progress-wrap {
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ee7f7, #a78bfa);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }
    .scene-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }
    .scene-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6ee7f7;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Controls panel ── */
    #controls {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50px;
      padding: 10px 16px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: opacity 0.4s ease;
    }
    #controls.hide { opacity: 0; pointer-events: none; }

    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s, color 0.2s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover  { background: rgba(255,255,255,0.22); transform: scale(1.08); }
    .ctrl-btn:active { transform: scale(0.94); }
    .ctrl-btn.active {
      background: linear-gradient(135deg, #6ee7f7 0%, #a78bfa 100%);
      color: #fff;
      box-shadow: 0 0 14px rgba(110,231,247,0.45);
    }
    .ctrl-btn svg { width: 18px; height: 18px; }

    .ctrl-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.15);
      margin: 0 4px;
    }

    /* ── FOV / zoom label ── */
    #fov-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      min-width: 42px;
      text-align: center;
      user-select: none;
    }

    /* ── Hint toast ── */
    #hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.5px;
      z-index: 10;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    /* ── Fullscreen button (top-right) ── */
    #btn-fullscreen {
      position: fixed;
      top: 20px; right: 24px;
      pointer-events: all;
      z-index: 10;
    }

    /* ── Tooltip ── */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
      padding: 4px 10px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    [data-tip]:hover::after { opacity: 1; }

    /* ── Compass ── */
    #compass {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      z-index: 10;
      opacity: 0.7;
      pointer-events: none;
    }
    #compass svg { width: 100%; height: 100%; }
    #compass-needle { transform-origin: 50% 50%; }

    @media (max-width: 480px) {
      #controls { gap: 7px; padding: 8px 12px; }
      .ctrl-btn  { width: 36px; height: 36px; }
      #compass   { right: 12px; }
      #btn-fullscreen { top: 14px; right: 14px; }
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Panorama</div>
  <div class="loader-progress-wrap">
    <div class="loader-progress-bar" id="progress-bar"></div>
  </div>
</div>

<!-- Canvas -->
<div id="canvas-container"></div>

<!-- Top bar -->
<div id="topbar">
  <div>
    <div class="scene-title">Panchkula First Floor</div>
    <div class="scene-subtitle">360° Immersive View</div>
  </div>
  <div class="badge"><span class="badge-dot"></span>360°</div>
</div>

<!-- Fullscreen button -->
<button class="ctrl-btn" id="btn-fullscreen" data-tip="Fullscreen" aria-label="Toggle fullscreen">
  <svg id="fs-icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
  <svg id="fs-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
    <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
  </svg>
</button>

<!-- Compass -->
<div id="compass" aria-hidden="true">
  <svg viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="20" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="22" y="9"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="7" font-family="sans-serif">N</text>
    <text x="22" y="39" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="7" font-family="sans-serif">S</text>
    <text x="8"  y="25" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="7" font-family="sans-serif">W</text>
    <text x="36" y="25" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="7" font-family="sans-serif">E</text>
    <g id="compass-needle">
      <polygon points="22,12 24,22 22,20 20,22" fill="#6ee7f7"/>
      <polygon points="22,32 24,22 22,24 20,22" fill="rgba(255,255,255,0.3)"/>
    </g>
  </svg>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" id="btn-zoom-out" data-tip="Zoom out" aria-label="Zoom out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>

  <span id="fov-label">75°</span>

  <button class="ctrl-btn" id="btn-zoom-in" data-tip="Zoom in" aria-label="Zoom in">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>

  <div class="ctrl-divider"></div>

  <button class="ctrl-btn active" id="btn-autorotate" data-tip="Auto-rotate" aria-label="Toggle auto-rotate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
  </button>

  <button class="ctrl-btn" id="btn-reset" data-tip="Reset view" aria-label="Reset view">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>

  <div class="ctrl-divider"></div>

  <button class="ctrl-btn" id="btn-gyro" data-tip="Gyroscope" aria-label="Toggle gyroscope">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M6.3 6.3a8 8 0 1 0 11.4 0"/>
      <line x1="12" y1="2" x2="12" y2="5"/>
    </svg>
  </button>
</div>

<!-- Hint -->
<div id="hint">
  <span id="hint-text">🖱 Drag to explore &nbsp;·&nbsp; Scroll to zoom</span>
</div>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(() => {
  'use strict';

  /* ─── Config ─── */
  const IMAGE_PATH  = 'Panchkula_first_floor_.jpg';
  const FOV_DEFAULT = 75;
  const FOV_MIN     = 30;
  const FOV_MAX     = 100;
  const FOV_STEP    = 10;
  const AUTO_SPEED  = 0.04;   // degrees per frame
  const DAMPING     = 0.88;

  /* ─── State ─── */
  let fov          = FOV_DEFAULT;
  let targetFov    = FOV_DEFAULT;
  let autoRotate   = true;
  let gyroActive   = false;
  let isDragging   = false;
  let prevX = 0, prevY = 0;
  let velX = 0, velY = 0;
  let lon = 0, lat = 0;
  let targetLon = 0, targetLat = 0;
  let pinchDist    = null;

  /* ─── DOM refs ─── */
  const container    = document.getElementById('canvas-container');
  const loader       = document.getElementById('loader');
  const progressBar  = document.getElementById('progress-bar');
  const btnZoomIn    = document.getElementById('btn-zoom-in');
  const btnZoomOut   = document.getElementById('btn-zoom-out');
  const btnAutoRot   = document.getElementById('btn-autorotate');
  const btnReset     = document.getElementById('btn-reset');
  const btnFullscreen= document.getElementById('btn-fullscreen');
  const btnGyro      = document.getElementById('btn-gyro');
  const fovLabel     = document.getElementById('fov-label');
  const hint         = document.getElementById('hint');
  const hintText     = document.getElementById('hint-text');
  const needle       = document.getElementById('compass-needle');
  const fsEnter      = document.getElementById('fs-icon-enter');
  const fsExit       = document.getElementById('fs-icon-exit');

  /* ─── Three.js setup ─── */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 0.01);

  /* Sphere geometry — inverted normals for inside view */
  const geo = new THREE.SphereGeometry(500, 64, 32);
  geo.scale(-1, 1, 1);

  const loader3 = new THREE.TextureLoader();
  loader3.load(
    IMAGE_PATH,
    (texture) => {
      texture.encoding = THREE.sRGBEncoding;
      const mat  = new THREE.MeshBasicMaterial({ map: texture });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      /* fade out loader */
      progressBar.style.width = '100%';
      setTimeout(() => { loader.classList.add('hidden'); }, 500);
      /* hide hint after 5s */
      setTimeout(() => hint.classList.add('hidden'), 5000);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        progressBar.style.width = Math.round(xhr.loaded / xhr.total * 100) + '%';
      }
    },
    (err) => {
      console.error('Texture load error', err);
      loader.querySelector('.loader-text').textContent = 'Failed to load image';
    }
  );

  /* ─── Render loop ─── */
  function render() {
    requestAnimationFrame(render);

    /* Auto-rotate */
    if (autoRotate && !isDragging) targetLon += AUTO_SPEED;

    /* Apply inertia */
    if (!isDragging) {
      targetLon += velX;
      targetLat += velY;
      velX *= DAMPING;
      velY *= DAMPING;
    }

    /* Smooth interpolation */
    lon += (targetLon - lon) * 0.08;
    lat += (targetLat - lat) * 0.08;
    fov += (targetFov - fov) * 0.1;

    /* Clamp latitude */
    lat = Math.max(-85, Math.min(85, lat));
    targetLat = Math.max(-85, Math.min(85, targetLat));

    camera.fov = fov;
    camera.updateProjectionMatrix();

    /* Convert to 3D look-at */
    const phi   = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(
      Math.sin(phi) * Math.cos(theta),
      Math.cos(phi),
      Math.sin(phi) * Math.sin(theta)
    );

    /* Compass */
    needle.setAttribute('transform', `rotate(${lon}, 22, 22)`);

    renderer.render(scene, camera);
  }
  render();

  /* ─── Resize ─── */
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  /* ─── Mouse events ─── */
  container.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
    velX = 0; velY = 0;
    container.classList.add('dragging');
    if (autoRotate) autoRotate = false;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    velX = -dx * 0.15;
    velY = -dy * 0.1;
    targetLon -= dx * 0.15;
    targetLat -= dy * 0.1;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    container.classList.remove('dragging');
  });

  /* Scroll to zoom */
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    targetFov = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFov + e.deltaY * 0.04));
    updateFovLabel();
  }, { passive: false });

  /* ─── Touch events ─── */
  container.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isDragging = true;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      velX = 0; velY = 0;
      if (autoRotate) autoRotate = false;
    } else if (e.touches.length === 2) {
      pinchDist = getPinchDist(e);
    }
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      velX = -dx * 0.18;
      velY = -dy * 0.12;
      targetLon -= dx * 0.18;
      targetLat -= dy * 0.12;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const newDist = getPinchDist(e);
      if (pinchDist !== null) {
        targetFov = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFov - (newDist - pinchDist) * 0.08));
        updateFovLabel();
      }
      pinchDist = newDist;
    }
  }, { passive: false });

  container.addEventListener('touchend', () => {
    isDragging = false;
    pinchDist = null;
  });

  function getPinchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  /* ─── Button actions ─── */
  btnZoomIn.addEventListener('click', () => {
    targetFov = Math.max(FOV_MIN, targetFov - FOV_STEP);
    updateFovLabel();
  });

  btnZoomOut.addEventListener('click', () => {
    targetFov = Math.min(FOV_MAX, targetFov + FOV_STEP);
    updateFovLabel();
  });

  btnAutoRot.addEventListener('click', () => {
    autoRotate = !autoRotate;
    btnAutoRot.classList.toggle('active', autoRotate);
  });

  btnReset.addEventListener('click', () => {
    targetLon = 0; targetLat = 0;
    targetFov = FOV_DEFAULT;
    updateFovLabel();
  });

  btnFullscreen.addEventListener('click', toggleFullscreen);

  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);

  function toggleFullscreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).call(document.documentElement);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  function updateFsIcon() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsEnter.style.display = isFs ? 'none' : '';
    fsExit.style.display  = isFs ? '' : 'none';
  }

  /* ─── Gyroscope ─── */
  btnGyro.addEventListener('click', () => {
    if (!gyroActive) {
      requestGyro();
    } else {
      disableGyro();
    }
  });

  let gyroHandler = null;

  function requestGyro() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') enableGyro();
          else alert('Gyroscope permission denied.');
        }).catch(console.error);
    } else if (window.DeviceOrientationEvent) {
      enableGyro();
    } else {
      alert('Gyroscope not available on this device.');
    }
  }

  function enableGyro() {
    gyroActive = true;
    btnGyro.classList.add('active');
    autoRotate = false;
    btnAutoRot.classList.remove('active');

    gyroHandler = (e) => {
      if (e.alpha === null) return;
      const orient = window.screen.orientation?.angle || window.orientation || 0;
      let beta  = e.beta  * (Math.PI / 180);
      let alpha = e.alpha * (Math.PI / 180);

      if (orient === 90 || orient === -90) {
        targetLat = THREE.MathUtils.radToDeg(e.gamma * (Math.PI / 180)) * -1;
      } else {
        targetLat = THREE.MathUtils.radToDeg(beta) - 90;
      }
      targetLon = -THREE.MathUtils.radToDeg(alpha);
    };
    window.addEventListener('deviceorientation', gyroHandler, true);
  }

  function disableGyro() {
    gyroActive = false;
    btnGyro.classList.remove('active');
    if (gyroHandler) window.removeEventListener('deviceorientation', gyroHandler, true);
    gyroHandler = null;
  }

  /* ─── FOV label ─── */
  function updateFovLabel() {
    fovLabel.textContent = Math.round(targetFov) + '°';
  }

  /* ─── Hint – show touch hint on mobile ─── */
  if ('ontouchstart' in window) {
    hintText.textContent = '👆 Drag to explore · Pinch to zoom';
  }

})();
</script>
</body>
</html>
